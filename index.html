<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JujuyTV — Streaming en vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e8302a; --red-dim: #7a1a17;
  --bg: #080810; --bg2: #0e0e1a; --bg3: #141424;
  --border: #1e1e32; --text: #d4d4e8; --muted: #555570; --active: #1c1c38;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
header { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:52px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; gap:12px; }
.logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-pulse { width:8px; height:8px; background:var(--red); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(232,48,42,0.5)} 50%{opacity:0.6;box-shadow:0 0 0 5px rgba(232,48,42,0)} }
.logo-text { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; letter-spacing:2px; color:#fff; line-height:1; }
.logo-text span { color:var(--red); }
.logo-tag { font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:2px; display:block; }
.clock { font-family:'Barlow Condensed',sans-serif; font-size:18px; color:var(--muted); letter-spacing:2px; flex-shrink:0; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
.sidebar-head { padding:12px 14px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sidebar-title { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
.channels-list { overflow-y:auto; flex:1; }
.channels-list::-webkit-scrollbar { width:3px; }
.channels-list::-webkit-scrollbar-thumb { background:var(--border); }
.ch-item { display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; border-bottom:1px solid var(--border); border-left:3px solid transparent; transition:all 0.12s; }
.ch-item:hover { background:var(--bg3); }
.ch-item.active { background:var(--active); border-left-color:var(--red); }
.ch-thumb { width:38px; height:38px; border-radius:50%; background:var(--bg3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; border:1px solid var(--border); }
.ch-meta { flex:1; min-width:0; }
.ch-name { font-size:13px; font-weight:500; color:#e0e0f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ch-sub { font-size:10px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.badge { font-size:9px; padding:2px 6px; border-radius:3px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:0.5px; flex-shrink:0; }
.badge-live { background:var(--red); color:#fff; }
.badge-idle { background:var(--bg3); color:var(--muted); border:1px solid var(--border); }
.badge-load { background:#1e2a1e; color:#4a8; border:1px solid #2a3a2a; }
.player-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.video-wrap { flex:1; background:#000; position:relative; display:flex; align-items:center; justify-content:center; }
#yt-frame { width:100%; height:100%; border:none; display:none; }
.splash { text-align:center; padding:40px 20px; }
.splash-logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:72px; color:#1a1a2e; letter-spacing:6px; line-height:1; margin-bottom:16px; user-select:none; }
.splash-logo span { color:#2a1a1a; }
.splash p { font-size:14px; color:var(--muted); max-width:320px; margin:0 auto; line-height:1.6; }
.splash small { font-size:11px; color:#333350; display:block; margin-top:10px; }
.no-live { text-align:center; padding:40px 20px; display:none; flex-direction:column; align-items:center; }
.no-live-icon { font-size:48px; margin-bottom:12px; opacity:0.3; }
.no-live h3 { font-family:'Barlow Condensed',sans-serif; font-size:20px; color:var(--muted); margin-bottom:6px; }
.no-live p { font-size:13px; color:#33334a; }
.videos-list { margin-top:20px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:500px; }
.vid-thumb { width:140px; cursor:pointer; border-radius:6px; overflow:hidden; border:1px solid var(--border); transition:border-color 0.15s; }
.vid-thumb:hover { border-color:var(--red-dim); }
.vid-thumb img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
.vid-thumb-title { font-size:10px; color:var(--muted); padding:4px 6px; background:var(--bg3); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.infobar { background:var(--bg2); border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }
.now-left { display:flex; align-items:center; gap:12px; min-width:0; }
.now-num { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--red); line-height:1; min-width:20px; }
.now-name { font-size:14px; font-weight:500; color:#e8e8ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:260px; }
.now-prog { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:260px; }
.ctrl-row { display:flex; gap:6px; flex-shrink:0; }
.ctrl { background:var(--bg3); border:1px solid var(--border); color:var(--muted); width:34px; height:34px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.12s; }
.ctrl:hover { border-color:#333355; color:var(--text); background:var(--active); }
.ctrl-wide { width:auto; padding:0 12px; font-size:12px; font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.guide { background:var(--bg); border-top:1px solid var(--border); max-height:0; overflow:hidden; transition:max-height 0.3s ease; flex-shrink:0; }
.guide.open { max-height:180px; overflow-y:auto; }
.guide-row { display:flex; align-items:center; gap:10px; padding:9px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.guide-row:hover, .guide-row.active { background:var(--active); }
.gr-n { font-family:'Barlow Condensed',sans-serif; font-size:14px; color:var(--muted); width:20px; text-align:right; }
.gr-name { font-size:13px; font-weight:500; color:#ccc; flex:0 0 160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gr-prog { font-size:11px; color:var(--muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.loading-overlay { position:absolute; inset:0; background:rgba(8,8,16,0.9); flex-direction:column; align-items:center; justify-content:center; gap:12px; display:none; }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-pulse"></div>
    <div>
      <div class="logo-text">JUJUY<span>TV</span></div>
      <div class="logo-tag">en vivo · youtube</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="ctrl ctrl-wide" onclick="reloadAll()">↺ Actualizar</button>
  </div>
  <div class="clock" id="clock">00:00</div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-head"><div class="sidebar-title">Canales · Jujuy</div></div>
    <div class="channels-list" id="channels-list"></div>
  </div>
  <div class="player-area">
    <div class="video-wrap" id="video-wrap">
      <iframe id="yt-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      <div class="splash" id="splash">
        <div class="splash-logo">JUJUY<span>TV</span></div>
        <p>Seleccioná un canal para sintonizar el stream en vivo o los últimos videos.</p>
        <small>Todos los canales son de Jujuy, Argentina</small>
      </div>
      <div class="no-live" id="no-live">
        <div class="no-live-icon">📡</div>
        <h3>Sin transmisión en vivo ahora</h3>
        <p>Últimos videos del canal:</p>
        <div class="videos-list" id="videos-list"></div>
      </div>
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Sintonizando...</div>
      </div>
    </div>
    <div class="infobar">
      <div class="now-left">
        <div class="now-num" id="now-num">—</div>
        <div>
          <div class="now-name" id="now-name">Sin señal</div>
          <div class="now-prog" id="now-prog">Seleccioná un canal</div>
        </div>
      </div>
      <div class="ctrl-row">
        <button class="ctrl" onclick="prevCh()">▲</button>
        <button class="ctrl" onclick="nextCh()">▼</button>
        <button class="ctrl ctrl-wide" onclick="toggleGuide()">≡ GUÍA</button>
        <button class="ctrl ctrl-wide" onclick="refreshCurrent()">↺</button>
      </div>
    </div>
    <div class="guide" id="guide"><div id="guide-rows"></div></div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyAHehii1CnI_ZMbPAkqWD73XzX82eJyw3A';

const CHANNELS = [
  { id:1, name:"El Tribuno",         handle:"eltribunojujuy",   sub:"Noticias",             emoji:"🗞️" },
  { id:2, name:"Ahora Jujuy",        handle:"AhoraJujuy",       sub:"FM Santa María 104.9", emoji:"📻", note:"18–20 hs" },
  { id:3, name:"Coya TV",            handle:"coyatvok",         sub:"TV local",             emoji:"📺" },
  { id:4, name:"Stream MAX",         handle:"stream_max",       sub:"Entretenimiento",      emoji:"🎮" },
  { id:5, name:"Diario Somos Jujuy", handle:"DiarioSomosJujuy", sub:"Noticias",             emoji:"📰" },
];

let current=-1, guideOpen=false, channelData={};

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}
updateClock(); setInterval(updateClock,1000);

window.onload=()=>initApp();

async function initApp(){renderSidebar();renderGuide();await Promise.all(CHANNELS.map(ch=>loadChannel(ch)));renderSidebar();renderGuide();}
function reloadAll(){channelData={};initApp();}

async function apiGet(path){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${API_KEY}`);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error');}
  return r.json();
}

async function loadChannel(ch){
  try{
    let cid=channelData[ch.handle]?.channelId;
    if(!cid){const res=await apiGet(`channels?part=id&forHandle=${ch.handle}&maxResults=1`);if(!res.items?.length)return;cid=res.items[0].id;}
    channelData[ch.handle]=channelData[ch.handle]||{};
    channelData[ch.handle].channelId=cid;
    const live=await apiGet(`search?part=snippet&channelId=${cid}&eventType=live&type=video&maxResults=1`);
    if(live.items?.length){
      channelData[ch.handle].live={videoId:live.items[0].id.videoId,title:live.items[0].snippet.title};
      channelData[ch.handle].recent=[];
    }else{
      channelData[ch.handle].live=null;
      const rec=await apiGet(`search?part=snippet&channelId=${cid}&order=date&type=video&maxResults=4`);
      channelData[ch.handle].recent=(rec.items||[]).map(v=>({videoId:v.id.videoId,title:v.snippet.title,thumb:v.snippet.thumbnails?.medium?.url}));
    }
  }catch(e){console.warn(`Error cargando ${ch.handle}:`,e.message);channelData[ch.handle]=channelData[ch.handle]||{error:e.message};}
}

function renderSidebar(){
  document.getElementById('channels-list').innerHTML=CHANNELS.map((ch,i)=>{
    const d=channelData[ch.handle];
    let b=`<span class="badge badge-load">...</span>`;
    if(d){if(d.error)b=`<span class="badge badge-idle">error</span>`;else if(d.live)b=`<span class="badge badge-live">● VIVO</span>`;else if(d.recent)b=`<span class="badge badge-idle">grabado</span>`;}
    return `<div class="ch-item ${i===current?'active':''}" onclick="tune(${i})"><div class="ch-thumb">${ch.emoji}</div><div class="ch-meta"><div class="ch-name">${ch.name}</div><div class="ch-sub">${ch.sub}${ch.note?' · '+ch.note:''}</div></div>${b}</div>`;
  }).join('');
}

function renderGuide(){
  document.getElementById('guide-rows').innerHTML=CHANNELS.map((ch,i)=>{
    const d=channelData[ch.handle];
    const p=d?.live?`🔴 ${d.live.title}`:d?.recent?.length?`📼 ${d.recent[0]?.title||''}`:'…';
    return `<div class="guide-row ${i===current?'active':''}" onclick="tune(${i})"><span class="gr-n">${ch.id}</span><span style="font-size:16px">${ch.emoji}</span><span class="gr-name">${ch.name}</span><span class="gr-prog">${p}</span></div>`;
  }).join('');
}

async function tune(i){
  current=i;const ch=CHANNELS[i];
  document.getElementById('now-num').textContent=ch.id;
  document.getElementById('now-name').textContent=ch.name;
  document.getElementById('now-prog').textContent=ch.sub;
  renderSidebar();renderGuide();showLoading(true);
  await loadChannel(ch);renderSidebar();renderGuide();
  const d=channelData[ch.handle];showLoading(false);
  if(!d||d.error){setNoLive([]);document.getElementById('now-prog').textContent='Error al conectar';return;}
  if(d.live){playVideo(d.live.videoId);document.getElementById('now-prog').textContent=`🔴 EN VIVO · ${d.live.title}`;}
  else{setNoLive(d.recent||[]);document.getElementById('now-prog').textContent='Sin transmisión en vivo ahora';}
}

function playVideo(id){
  document.getElementById('splash').style.display='none';
  document.getElementById('no-live').style.display='none';
  const f=document.getElementById('yt-frame');f.style.display='block';
  f.src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
}

function setNoLive(recent){
  document.getElementById('splash').style.display='none';
  const f=document.getElementById('yt-frame');f.style.display='none';f.src='';
  const nl=document.getElementById('no-live');nl.style.display='flex';
  document.getElementById('videos-list').innerHTML=recent.length
    ?recent.map(v=>`<div class="vid-thumb" onclick="playVideo('${v.videoId}')"><img src="${v.thumb}" alt="" loading="lazy"><div class="vid-thumb-title">${v.title}</div></div>`).join('')
    :`<p style="color:var(--muted);font-size:12px">No hay videos disponibles</p>`;
}

function showLoading(s){document.getElementById('loading-overlay').style.display=s?'flex':'none';}
function prevCh(){tune((current-1+CHANNELS.length)%CHANNELS.length);}
function nextCh(){tune((current+1)%CHANNELS.length);}
function refreshCurrent(){if(current>=0)tune(current);}
function toggleGuide(){guideOpen=!guideOpen;document.getElementById('guide').classList.toggle('open',guideOpen);}
</script>
</body>
</html>
